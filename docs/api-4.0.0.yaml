openapi: 3.0.3
info:
  title: Bambushain API
  description: API for Bambushain application
  version: 4.0.0
  contact:
    name: Panda Helferlein
    url: https://bambushain.app
    email: panda.helferlein@bambushain.app
  x-logo:
    url: /assets/bamboo.webp
    backgroundColor: '#FFFFFF'
    altText: Bambushain logo
servers:
  - url: https://bambushain.app/
    description: Production Server
  - url: https://testing.bambushain.app/
    description: Beta Server
  - url: https://v4-review.bambushain.app/
    description: V4 Alpha Server
tags:
  - name: authentication
    description: User authentication
    x-displayName: User authentication
  - name: my-profile
    description: My profile
    x-displayName: My profile
  - name: groves
    description: Groves and their management
    x-displayName: Groves
  - name: calendar
    description: Calendar and its management
    x-displayName: Calendar
  - name: pandas
    description: Pandas and their management
    x-displayName: Pandas
  - name: legal
    description: Licenses and other legal stuff
    x-displayName: Legal
  - name: support
    description: Bamboo support
    x-displayName: Support
  - name: characters
    description: Final Fantasy Characters
    x-displayName: Characters
  - name: fighters
    description: Final Fantasy Fighters
    x-displayName: Fighters
  - name: gatherers
    description: Final Fantasy Gatherers
    x-displayName: Gatherers
  - name: crafters
    description: Final Fantasy Crafters
    x-displayName: Crafters
  - name: housing
    description: Final Fantasy Housing
    x-displayName: Housing
  - name: free-companies
    description: Final Fantasy Free Companies
    x-displayName: Free Companies
  - name: custom-fields
    description: Final Fantasy Custom Character Fields
    x-displayName: Custom Fields
paths:
  /api/login:
    post:
      summary: Login to the application
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/login'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/login-result'
        '204':
          description: Two-factor authentication required
        '401':
          description: Invalid login credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - authentication
    delete:
      summary: Logout from the application
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Successfully logged out
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - authentication
    head:
      summary: Check if token is valid
      operationId: checkToken
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Token is valid
        '401':
          description: Token is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - authentication
  /api/forgot-password:
    post:
      summary: Request password reset
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/forgot-password'
      responses:
        '204':
          description: Password reset email sent
      tags:
        - authentication
  /api/reset-password:
    post:
      summary: Reset password using token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/reset-password'
      responses:
        '204':
          description: Password reset successful
        '400':
          description: Invalid token or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - authentication
  /api/my/profile:
    get:
      summary: Get current user profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - my-profile
    put:
      summary: Update current user profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-profile'
      responses:
        '204':
          description: Profile updated successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - my-profile
  /api/my/password:
    put:
      summary: Change current user password
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/change-password'
      responses:
        '204':
          description: Password changed successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - my-profile
  /api/my/totp:
    post:
      summary: Enable totp
      operationId: enableTotp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/totp-qr-code'
      responses:
        '204':
          description: Totp enablement request send successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - my-profile
    delete:
      summary: Disable totp
      operationId: disableTotp
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Totp disabled successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - my-profile
  /api/my/totp/validate:
    put:
      summary: Validate the totp registration
      operationId: validateTotp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/validate-totp'
      responses:
        '204':
          description: Totp validated successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - my-profile
  /api/grove:
    get:
      summary: Get all groves for authenticated user
      operationId: getGroves
      responses:
        '200':
          description: List of groves
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/grove'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
    post:
      summary: Create a new grove
      operationId: createGrove
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-grove'
      responses:
        '201':
          description: Grove created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/grove'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
  /api/grove/{grove_id}:
    get:
      summary: Get a specific grove
      operationId: getGrove
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      responses:
        '200':
          description: Grove details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/grove'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
    put:
      summary: Update grove (requires moderator permissions)
      operationId: updateGrove
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/grove'
      responses:
        '204':
          description: Grove updated successfully
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
    delete:
      summary: Delete grove (requires moderator permissions)
      operationId: deleteGrove
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      responses:
        '204':
          description: Grove deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
  /api/grove/{grove_id}/user:
    get:
      summary: Get users of a grove
      operationId: getGroveUsers
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      responses:
        '200':
          description: Grove details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/grove-user'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
  /api/grove/{grove_id}/invite:
    put:
      summary: Enable grove invites (requires moderator permissions)
      operationId: enableInvite
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      responses:
        '204':
          description: Invites enabled successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
    delete:
      summary: Disable grove invites (requires moderator permissions)
      operationId: disableInvite
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      responses:
        '204':
          description: Invites disabled successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
  /api/grove/{grove_id}/join:
    post:
      summary: Join a grove
      operationId: joinGrove
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/join-grove'
      responses:
        '204':
          description: Successfully joined grove
        '400':
          description: Invalid request body or invite secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Not allowed to join (banned or invites disabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
    get:
      summary: Check join status for a grove
      operationId: checkJoinStatus
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      responses:
        '200':
          description: Join status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/join-grove-status'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
  /api/grove/{grove_id}/mods:
    put:
      summary: Update grove moderators (requires moderator permissions)
      operationId: updateGroveMods
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
      responses:
        '204':
          description: Moderators updated successfully
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
  /api/grove/{grove_id}/user/{user_id}/ban:
    put:
      summary: Ban user from grove (requires moderator permissions)
      operationId: banUser
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
        - name: user_id
          required: true
          schema:
            type: string
          in: path
      responses:
        '204':
          description: User banned successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
    delete:
      summary: Unban user from grove (requires moderator permissions)
      operationId: unbanUser
      parameters:
        - name: grove_id
          required: true
          schema:
            type: string
          in: path
        - name: user_id
          required: true
          schema:
            type: string
          in: path
      responses:
        '204':
          description: User unbanned successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Grove or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - groves
  /api/bamboo-grove/event:
    get:
      summary: Get events
      description: Retrieve events within a date range, optionally filtered by grove
      parameters:
        - name: start
          in: query
          required: true
          description: Start date for event range
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: true
          description: End date for event range
          schema:
            type: string
            format: date
        - name: grove
          in: query
          required: false
          description: Optional grove ID to filter events
          schema:
            type: integer
      responses:
        '200':
          description: List of events retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/grove-event'
        '400':
          description: Invalid dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - calendar
    post:
      summary: Create event
      description: Create a new grove event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/grove-event'
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/grove-event'
        '400':
          description: Invalid dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - calendar
  /api/bamboo-grove/event/{event_id}:
    put:
      summary: Update event
      description: Update an existing grove event
      parameters:
        - name: event_id
          in: path
          required: true
          description: ID of the event to update
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/grove-event'
      responses:
        '204':
          description: Event updated successfully
        '400':
          description: Invalid dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - calendar
    delete:
      summary: Delete event
      description: Delete a grove event
      parameters:
        - name: event_id
          in: path
          required: true
          description: ID of the event to delete
          schema:
            type: integer
      responses:
        '204':
          description: Event deleted successfully
        '400':
          description: Invalid dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - calendar
  /api/bamboo-grove/event/{event_id}/reminder:
    get:
      summary: Get reminder for event
      description: Gets the reminder for the passed event id
      parameters:
        - name: event_id
          in: path
          required: true
          description: ID of the event to update
          schema:
            type: integer
      responses:
        '200':
          description: Event reminder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/event-reminder'
        '400':
          description: Invalid dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - calendar
    post:
      summary: Create event reminder
      description: Create a new grove event reminder
      parameters:
        - name: event_id
          in: path
          required: true
          description: ID of the event to update
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/event-reminder'
      responses:
        '201':
          description: Event reminder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/grove-event'
        '400':
          description: Invalid dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/grove-event'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/grove-event'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/grove-event'
      tags:
        - calendar
  /api/bamboo-grove/event/{event_id}/reminder/{reminder_id}:
    delete:
      summary: Delete event reminder
      description: Delete a grove event reminder
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
        - name: reminder_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Event deleted successfully
        '400':
          description: Invalid dates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - calendar
  /api/user:
    get:
      summary: Get all users
      operationId: getUsers
      security:
        - bearerAuth: []
      parameters:
        - name: grove
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: banned
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: all
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/user'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      tags:
        - pandas
  /api/user/{user_id}/picture:
    get:
