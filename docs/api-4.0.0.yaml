components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        twoFactorCode:
          type: string
      required:
        - email
        - password
    user:
      type: object
      properties:
        id:
          type: integer
          format: int32
        email:
          type: string
          format: email
        displayName:
          type: string
        discordName:
          type: string
        appTotpEnabled:
          type: boolean
          nullable: true
        profilePicture:
          type: string
    login-result:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/user'
        token:
          type: string
    error:
      type: object
      properties:
        entityType:
          type: string
        message:
          type: string
        errorType:
          type: string
    forgot-password:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    reset-password:
      type: object
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
          format: password
      required:
        - email
        - token
        - password
    update-profile:
      type: object
      properties:
        email:
          type: string
          format: email
        displayName:
          type: string
        discordName:
          type: string
      required:
        - email
        - displayName
        - discordName
    change-password:
      type: object
      properties:
        oldPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
      required:
        - oldPassword
        - newPassword
    totp-qr-code:
      type: object
      properties:
        qrCode:
          type: string
        secret:
          type: string
    validate-totp:
      type: object
      properties:
        code:
          type: string
        password:
          type: string
          format: password
      required:
        - code
        - password
    grove:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        inviteEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    create-grove:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
    grove-user:
      type: object
      properties:
        id:
          type: integer
          format: int32
        email:
          type: string
          format: email
        displayName:
          type: string
        discordName:
          type: string
        isMod:
          type: boolean
        isBanned:
          type: boolean
    join-grove-status:
      type: string
      enum:
        - joined
        - not-joined
        - banned
    join-grove:
      type: object
      properties:
        groveId:
          type: string
          format: uuid
      required:
        - groveId
    event-reminder:
      type: object
      properties:
        id:
          type: integer
          format: int32
        when:
          type: string
          format: date-time
      required:
        - when
    grove-event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        reminder:
          type: array
          items:
            $ref: '#/components/schemas/event-reminder'
      required:
        - title
        - description
        - startDate
        - endDate
    support-request:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        message:
          type: string
      required:
        - name
        - email
        - message
    license:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        license:
          type: string
    character-race:
      type: string
      enum:
        - hyur
        - elezen
        - lalafell
        - miqote
        - roegadyn
        - au-ra
        - hrothgar
        - viera
    custom-field-option:
      type: object
      properties:
        id:
          type: integer
          format: int32
        label:
          type: string
      required:
        - label
    custom-field:
      type: object
      properties:
        id:
          type: integer
          format: int32
        label:
          type: string
        position:
          type: integer
          format: int32
        options:
          type: array
          items:
            $ref: '#/components/schemas/custom-field-option'
    free-company:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
      required:
        - name
    character:
      type: object
      properties:
        id:
          type: integer
          format: int32
        race:
          $ref: '#/components/schemas/character-race'
        name:
          type: string
        world:
          type: string
        datacenter:
          type: string
        customFields:
          type: array
          items:
            $ref: '#/components/schemas/custom-field'
        freeCompany:
          $ref: '#/components/schemas/free-company'
      required:
        - race
        - name
        - world
    housing-district:
      type: string
      enum:
        - the-lavender-beds
        - mist
        - the-goblet
        - shirogane
        - empyreum
    housing-type:
      type: string
      enum:
        - private
        - shared-apartment
    character-housing:
      type: object
      properties:
        id:
          type: integer
          format: int32
        district:
          $ref: '#/components/schemas/housing-district'
        housingType:
          $ref: '#/components/schemas/housing-type'
        ward:
          type: integer
          format: int16
        plot:
          type: integer
          format: int16
        characterId:
          type: integer
          format: int32
      required:
        - district
        - housingType
        - ward
        - plot
    crafter-job:
      type: string
      enum:
        - carpenter
        - blacksmith
        - armorer
        - goldsmith
        - leatherworker
        - weaver
        - alchemist
    crafter:
      type: object
      properties:
        id:
          type: integer
          format: int32
        job:
          $ref: '#/components/schemas/crafter-job'
        level:
          type: string
        characterId:
          type: integer
          format: int32
      required:
        - job
        - level
    fighter-job:
      type: string
      enum:
        - paladin
        - warrior
        - dark-knight
        - gunbreaker
        - white-mage
        - scholar
        - astrologian
        - sage
        - monk
        - dragoon
        - ninja
        - samurai
        - reaper
        - bard
        - machinist
        - dancer
        - black_mage
        - summoner
        - red-mage
        - blue-mage
        - viper
        - pictomancer
    fighter:
      type: object
      properties:
        id:
          type: integer
          format: int32
        job:
          $ref: '#/components/schemas/fighter-job'
        level:
          type: string
        gearScore:
          type: string
        characterId:
          type: integer
          format: int32
      required:
        - job
    gatherer-job:
      type: string
      enum:
        - culinarian
        - miner
        - botanist
        - fisher
    gatherer:
      type: object
      properties:
        id:
          type: integer
          format: int32
        job:
          $ref: '#/components/schemas/gatherer-job'
        level:
          type: string
        characterId:
          type: integer
          format: int32
      required:
        - job
    free-company-housing:
      type: object
      properties:
        id:
          type: integer
          format: int32
        district:
          $ref: '#/components/schemas/housing-district'
        ward:
          type: integer
          format: int16
        plot:
          type: integer
          format: int16
        freeCompanyId:
