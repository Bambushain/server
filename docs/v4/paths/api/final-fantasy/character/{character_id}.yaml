get:
  summary: Get a specific character
  operationId: getCharacter
  security:
    - bearerAuth: [ ]
  parameters:
    - name: character_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  responses:
    "200":
      description: Character details
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/character.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "404":
      description: Character not found
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
  tags:
    - characters
put:
  summary: Update a character
  operationId: updateCharacter
  security:
    - bearerAuth: [ ]
  parameters:
    - name: character_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../../components/schemas/character.yaml"
  responses:
    "204":
      description: Character updated successfully
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "404":
      description: Character not found
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
  tags:
    - characters
delete:
  summary: Delete a character
  operationId: deleteCharacter
  security:
    - bearerAuth: [ ]
  parameters:
    - name: character_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  responses:
    "204":
      description: Character deleted successfully
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "404":
      description: Character not found
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
  tags:
    - characters
