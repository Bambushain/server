get:
  summary: Get all custom fields
  operationId: getCustomFields
  security:
    - bearerAuth: [ ]
  responses:
    "200":
      description: List of custom fields
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../../components/schemas/custom-field.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
  tags:
    - custom-fields
post:
  summary: Create a new custom field
  operationId: createCustomField
  security:
    - bearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../../components/schemas/custom-field.yaml"
  responses:
    "201":
      description: Custom field created successfully
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/custom-field.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
  tags:
    - custom-fields
