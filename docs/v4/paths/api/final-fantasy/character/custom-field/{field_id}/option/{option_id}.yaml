put:
  summary: Update an option for a custom field
  operationId: updateCustomFieldOption
  security:
    - bearerAuth: [ ]
  parameters:
    - name: field_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
    - name: option_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: string
  responses:
    "204":
      description: Custom field option updated successfully
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../../../../components/schemas/error.yaml"
    "404":
      description: Custom field option not found
      content:
        application/json:
          schema:
            $ref: "../../../../../../../components/schemas/error.yaml"
  tags:
    - custom-fields
delete:
  summary: Delete an option for a custom field
  operationId: deleteCustomFieldOption
  security:
    - bearerAuth: [ ]
  parameters:
    - name: field_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
    - name: option_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  responses:
    "204":
      description: Custom field option deleted successfully
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../../../../components/schemas/error.yaml"
    "404":
      description: Custom field option not found
      content:
        application/json:
          schema:
            $ref: "../../../../../../../components/schemas/error.yaml"
  tags:
    - custom-fields
