get:
  summary: Get all crafters for a character
  operationId: getCrafters
  security:
    - bearerAuth: [ ]
  parameters:
    - name: character_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  responses:
    "200":
      description: List of crafters
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../../../components/schemas/crafter.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../../components/schemas/error.yaml"
    "404":
      description: Character not found
      content:
        application/json:
          schema:
            $ref: "../../../../../components/schemas/error.yaml"
  tags:
    - crafters
post:
  summary: Create a new crafter for a character
  operationId: createCrafter
  security:
    - bearerAuth: [ ]
  parameters:
    - name: character_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../../../components/schemas/crafter.yaml"
  responses:
    "201":
      description: Crafter created successfully
      content:
        application/json:
          schema:
            $ref: "../../../../../components/schemas/crafter.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../../components/schemas/error.yaml"
    "404":
      description: Character not found
      content:
        application/json:
          schema:
            $ref: "../../../../../components/schemas/error.yaml"
  tags:
    - crafters
