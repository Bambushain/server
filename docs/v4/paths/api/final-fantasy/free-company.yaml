get:
  summary: Get all free companies
  operationId: getFreeCompanies
  security:
    - bearerAuth: [ ]
  responses:
    "200":
      description: List of free companies
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../components/schemas/free-company.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error.yaml"
  tags:
    - free-companies
post:
  summary: Create a new free company
  operationId: createFreeCompany
  security:
    - bearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/free-company.yaml"
  responses:
    "201":
      description: Free company created successfully
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/free-company.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error.yaml"
  tags:
    - free-companies
