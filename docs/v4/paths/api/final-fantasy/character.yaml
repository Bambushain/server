get:
  summary: Get all characters
  operationId: getCharacters
  security:
    - bearerAuth: [ ]
  responses:
    "200":
      description: List of characters
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../../components/schemas/character.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error.yaml"
  tags:
    - characters
post:
  summary: Create a new character
  operationId: createCharacter
  security:
    - bearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/character.yaml"
  responses:
    "201":
      description: Character created successfully
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/character.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error.yaml"
  tags:
    - characters