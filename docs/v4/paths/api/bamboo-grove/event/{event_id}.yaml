put:
  summary: Update event
  description: Update an existing grove event
  operationId: updateEvent
  parameters:
    - name: event_id
      in: path
      required: true
      description: ID of the event to update
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../../components/schemas/grove-event.yaml"
  responses:
    "204":
      description: Event updated successfully
    "400":
      description: Invalid dates
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
  tags:
    - calendar
delete:
  summary: Delete event
  description: Delete a grove event
  operationId: deleteEvent
  parameters:
    - name: event_id
      in: path
      required: true
      description: ID of the event to delete
      schema:
        type: integer
  responses:
    "204":
      description: Event deleted successfully
    "400":
      description: Invalid dates
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
  tags:
    - calendar