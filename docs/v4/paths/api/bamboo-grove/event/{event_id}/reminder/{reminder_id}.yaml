delete:
  summary: Delete event reminder
  description: Delete a grove event reminder
  parameters:
    - name: event_id
      in: path
      required: true
      schema:
        type: integer
    - name: reminder_id
      in: path
      required: true
      schema:
        type: integer
  responses:
    "204":
      description: Event deleted successfully
    "400":
      description: Invalid dates
      content:
        application/json:
          schema:
            $ref: "../../../../../../components/schemas/error.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../../../components/schemas/error.yaml"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: "../../../../../../components/schemas/error.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../../../../../../components/schemas/error.yaml"
  tags:
    - calendar