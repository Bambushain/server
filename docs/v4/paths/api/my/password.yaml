put:
  summary: Change current user password
  operationId: changePassword
  security:
    - bearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../../components/schemas/change-password.yaml"
  responses:
    "204":
      description: Password changed successfully
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../components/schemas/error.yaml"
  tags:
    - my-profile