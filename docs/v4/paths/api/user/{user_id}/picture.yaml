get:
  summary: Get a user"s profile picture
  operationId: getProfilePicture
  security:
    - bearerAuth: [ ]
  parameters:
    - name: user_id
      in: path
      required: true
      schema:
        type: integer
        format: int32
  responses:
    "200":
      description: Profile picture
      content:
        image/svg+xml:
          schema:
            type: string
            format: binary
        image/png:
          schema:
            type: string
            format: binary
        image/jpeg:
          schema:
            type: string
            format: binary
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
    "404":
      description: User not found
      content:
        application/json:
          schema:
            $ref: "../../../../components/schemas/error.yaml"
  tags:
    - pandas