type: object
properties:
  id:
    type: string
    format: uuid
  title:
    type: string
  description:
    type: string
  startDate:
    type: string
    format: date
  endDate:
    type: string
    format: date
  startTime:
    type: string
    format: time
  endTime:
    type: string
    format: time
  reminder:
    type: array
    items:
      $ref: "./event-reminder.yaml"
required:
  - title
  - description
  - startDate
  - endDate
