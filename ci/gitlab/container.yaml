build-docker-test:
  extends:
    - .base-docker-build
  stage: docker
  variables:
    NO_PUSH: yes

build-docker-mr:
  extends:
    - .base-docker-build
  stage: docker
  variables:
    TAG: 4.0.0-alpha.$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME.$CI_PIPELINE_IID
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build-docker-main:
  extends:
    - .base-docker-build
  stage: docker
  variables:
    TAG: 4.0.0-beta.$CI_PIPELINE_IID
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-docker-tag:
  extends:
    - .base-docker-build
  stage: docker
  variables:
    TAG: $CI_COMMIT_TAG
  rules:
    - if: $CI_COMMIT_TAG