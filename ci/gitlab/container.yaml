build-docker-test:
  extends:
    - .base-docker
  stage: docker
  variables:
    KANIKO_FLAGS: --no-push

build-docker-mr:
  extends:
    - .base-docker
  stage: docker
  variables:
    KANIKO_FLAGS: --destination ${CI_REGISTRY_IMAGE}/${APP}/${ARCH}:4.0.0-alpha.${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}.${CI_PIPELINE_IID}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build-docker-main:
  extends:
    - .base-docker
  stage: docker
  variables:
    KANIKO_FLAGS: --destination "${CI_REGISTRY_IMAGE}/${APP}/${ARCH}:4.0.0-beta.$CI_PIPELINE_IID"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-docker-tag:
  extends:
    - .base-docker
  stage: docker
  variables:
    KANIKO_FLAGS: --destination "${CI_REGISTRY_IMAGE}/${APP}/${ARCH}:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

merge-manifests-tag:
  extends:
    - .base-merge-manifests
  variables:
    TAG: $CI_COMMIT_TAG
  rules:
    - if: $CI_COMMIT_TAG

merge-manifests-mr:
  extends:
    - .base-merge-manifests
  variables:
    TAG: $CI_COMMIT_TAG
  script:
    - >-
      manifest-tool
      --username=${CI_REGISTRY_USER}
      --password=${CI_REGISTRY_PASSWORD}
      push from-args
      --platforms linux/amd64,linux/arm64
      --template ${CI_REGISTRY_IMAGE}/${APP}/ARCH:4.0.0-alpha.${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}.${CI_PIPELINE_IID}
      --target ${CI_REGISTRY_IMAGE}/${APP}:4.0.0-alpha.${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}.${CI_PIPELINE_IID}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

merge-manifests-main:
  extends:
    - .base-merge-manifests
  variables:
    TAG: 4.0.0-beta.$CI_PIPELINE_IID
  rules:
    - if: $CI_COMMIT_BRANCH == "main"