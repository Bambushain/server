pages:
  image:
    name: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/oven/bun:latest
    pull_policy: always
    entrypoint: [ "" ]
  stage: deploy
  script:
    - rm -r public
    - bunx @redocly/cli bundle  docs/v4/openapi.yaml -o docs/api-4.0.0.yaml --ext yaml
    - cp -r docs public
    - echo "/* /index.html 200" > public/_redirects
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "v4"