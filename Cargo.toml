[package]
name = "bamboo"
version.workspace = true
edition.workspace = true
license.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dependencies]
bamboo-backend = { path = "backend", optional = true }

actix = { workspace = true, optional = true }

[[bin]]
path = "src/bin/backend-api.rs"
name = "backend-api"
required-features = ["backend-api"]

[[bin]]
path = "src/bin/backend-events.rs"
name = "backend-events"
required-features = ["backend-events"]

[[bin]]
path = "src/bin/backend-mailer.rs"
name = "backend-mailer"
required-features = ["backend-mailer"]

[workspace]
members = [
    "common",
    "common/backend",
    "common/backend/actix",
    "common/backend/database",
    "common/backend/dbal",
    "common/backend/logging",
    "common/backend/macros",
    "common/backend/mailing",
    "common/backend/message_queue",
    "common/backend/migration",
    "common/backend/notification",
    "common/backend/response",
    "common/backend/services",
    "common/core",
    "common/core/entities",
    "common/core/error",
    "common/core/queueing",
    "common/frontend",
    "common/frontend/api",
    "backend",
    "backend/api",
    "backend/events",
    "backend/mailer",
    "frontend",
    "frontend/authentication",
    "frontend/pandas",
]

[workspace.package]
version = "4.0.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
actix = "0.13.5"
actix-files = "0.6.6"
actix-web = "4.9.0"
actix-web-lab = { version = "0.22.0", features = ["spa"] }
async-nats = "0.36.0"
async-trait = "0.1.81"
base64 = "0.22.1"
bcrypt = "0.15.1"
bounce = { version = "0.9.0", features = ["query", "helmet"] }
bytes = "1.7.1"
bytestring = "1.3.1"
cargo_metadata = "0.18.1"
chacha20poly1305 = "0.10.1"
chrono = { version = "0.4.38", features = ["serde", "unstable-locales"] }
ciborium = "0.2.2"
color-art = "0.3.8"
codee = { version = "0.2.0", features = ["json_serde"] }
console_error_panic_hook = "0.1.7"
console_log = { version = "1.0.0", features = ["color"] }
date-range = "0.3.0"
either = "1.13.0"
env_logger = "0.11.5"
fast_qr = { version = "0.12.5", features = ["svg"] }
futures = "0.3.30"
futures-util = "0.3.30"
getrandom = "0.2.15"
gloo = "0.11.0"
handlebars = "6.0.0"
hex = "0.4.3"
html2text = "0.12.5"
http = "1.1.0"
icondata_lu = "0.0.10"
itertools = "0.13.0"
leptos = "0.6.14"
leptos-cosmo = { path = "../leptos-cosmo" }
leptos_actix = "0.6.14"
leptos_meta = "0.6.14"
leptos_router = "0.6.14"
leptos-use = "0.13.5"
lettre = { version = "0.11.7", features = ["tokio1-rustls-tls", "smtp-transport", "pool", "hostname", "builder"], default-features = false }
log = "0.4.22"
maud = "0.26.0"
mrml = { version = "4.0.1", features = ["async", "parse", "render"] }
openidconnect = "3.5.0"
parking_lot = "0.12.3"
pbkdf2 = "0.12.2"
quote = "1.0.36"
rand = "0.8.5"
rust-s3 = "0.35.1"
sea-orm = { version = "1.0.0", features = ["with-json", "runtime-actix-rustls", "sqlx-postgres"] }
sea-orm-migration = { version = "1.0.0", features = ["sqlx-mysql", "runtime-tokio-rustls"] }
serde = { version = "1.0.207", features = ["derive"] }
serde_json = "1.0.124"
strum = "0.26.3"
sha2 = "0.10.8"
strum_macros = "0.26.4"
stylist = { version = "0.13.0", features = ["yew"] }
syn = "2.0.74"
tokio = "1.39.2"
tokio-stream = "0.1.15"
tokio-util = "0.7.11"
totp-rs = { version = "5.6.0", features = ["qr", "gen_secret"] }
uuid = { version = "1.10.0", features = ["v4"] }
wasm-bindgen = "0.2.93"
web-sys = "0.3.70"
url = "2.5.2"

[features]
default = []
backend = ["dep:actix", "dep:bamboo-backend"]
backend-api = ["backend", "bamboo-backend/api"]
backend-events = ["backend", "bamboo-backend/events"]
backend-mailer = ["backend", "bamboo-backend/mailer"]

[profile.web-dev]
inherits = "dev"
# optimization for size (more aggressive)
opt-level = "z"

[profile.web-release]
inherits = "release"
# less code to include in binary
panic = "abort"
# optimization over all codebase (better optimization, slower build)
codegen-units = 1
# optimization for size (more aggressive)
opt-level = "z"
# link time optimization using whole-program analysis
lto = true

# Defines a size-optimized profile for the WASM bundle in release mode
[profile.wasm-release]
inherits = "release"
opt-level = 'z'
lto = true
codegen-units = 1
panic = "abort"