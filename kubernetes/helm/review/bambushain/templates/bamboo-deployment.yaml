{{- range $key, $value := .Values.bamboo.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bamboo-{{ $key | lower }}
  namespace: {{ include "bambushain.namespace" $ }}
  labels:
    {{- include "bambushain.labels" $ | nindent 4 }}
spec:
  selector:
    matchLabels:
      bambushain.app/app: bamboo
      bambushain.app/service: bamboo-{{ $key | lower }}
  replicas: {{ $.Values.bamboo.replicas }}
  template:
    metadata:
      labels:
        bambushain.app/app: bamboo
        bambushain.app/service: bamboo-{{ $key | lower }}
        {{- include "bambushain.labels" $ | nindent 8 }}
    spec:
      containers:
        - name: {{ $key | lower }}
          image: "{{ $.Values.image.registry }}/{{ $value.image }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: bamboo
            - secretRef:
                name: passwords
          {{- if $value.env }}
          env:
            {{- toYaml $value.env | nindent 12 }}
          {{- end }}
          {{- if and $value.ports (gt (len $value.ports) 0) }}
          ports:
            {{- range $port := $value.ports }}
            - containerPort: {{ $port }}
            {{- end }}
          {{- end }}
          {{- if $value.volumeMounts }}
          volumeMounts:
            {{- toYaml $value.volumeMounts | nindent 12 }}
          {{- end }}
      {{- if $value.volumes }}
      volumes:
        {{- toYaml $value.volumes | nindent 6 }}
      {{- end }}
{{- end }}