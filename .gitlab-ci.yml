workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME !~ "/^dependabot-.*/"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

include:
  - /ci/gitlab/api-docs.yaml
  - /ci/gitlab/backend.yaml
  - /ci/gitlab/base.yaml
  - /ci/gitlab/container.yaml
  - /ci/gitlab/frontend.yaml
  - /ci/gitlab/review.yaml
  - /ci/gitlab/stages.yaml
  - /ci/gitlab/deployment.yaml